<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tarifas - Taximeter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="ticket">
        <div class="screen-tag">CONFIG</div>
        <div class="ticket-head">
            <div class="brand-mark">TX · MADRID</div>
            <h1 class="brand-title">TARIFAS</h1>
            <div class="brand-sub">EDICIÓN DE PRECIOS</div>
        </div>

        {% for mensaje in get_flashed_messages() %}
            <div class="flash">{{ mensaje }}</div>
        {% endfor %}

        <form method="POST">
            <div class="field-row">
                <div class="field-label">PARADO · POR SEGUNDO</div>
                <div class="field-current">vigente: €{{ rate_stopped }}</div>
                <input type="number" step="0.01" name="rate_stopped" required>
            </div>
            <div class="field-row">
                <div class="field-label">MOVIMIENTO · POR SEGUNDO</div>
                <div class="field-current">vigente: €{{ rate_moving }}</div>
                <input type="number" step="0.01" name="rate_moving" required>
            </div>

            <hr class="divider">

            <div class="actions">
                <button type="submit" name="confirmacion" value="1" class="fire">CONFIRMAR</button>
                <button type="submit" name="confirmacion" value="0">CANCELAR</button>
            </div>
        </form>

        <a href="/" class="back-link">← VOLVER</a>
    </div>
</body>
</html>
