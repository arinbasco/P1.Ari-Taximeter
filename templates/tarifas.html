<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Taximeter - Tarifas</title>
    <style>
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.activo {
            display: flex;
        }
        .modal {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            text-align: center;
            min-width: 300px;
        }
        .modal h3 {
            margin-top: 0;
        }
        .modal-botones {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
    <h1>Modificar tarifas</h1>

    {% for mensaje in get_flashed_messages() %}
        <p>{{ mensaje }}</p>
    {% endfor %}

    <form id="form-tarifas" method="POST">
        <input type="hidden" name="confirmacion" value="1">
        <label>Tarifa por segundo detenido (actual: €{{ rate_stopped }})</label><br>
        <input type="number" step="0.01" name="rate_stopped" required><br><br>
        <label>Tarifa por segundo en movimiento (actual: €{{ rate_moving }})</label><br>
        <input type="number" step="0.01" name="rate_moving" required><br><br>
        <button type="button" onclick="abrirModal()">Guardar cambios</button>
    </form>

    <a href="/">Volver</a>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h3>¿Confirmás los cambios?</h3>
            <p>Se actualizarán las tarifas con los nuevos valores.</p>
            <div class="modal-botones">
                <button onclick="document.getElementById('form-tarifas').submit()">Sí, actualizar</button>
                <button onclick="cerrarModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        function abrirModal() {
            var form = document.getElementById('form-tarifas');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }
            document.getElementById('modal-overlay').classList.add('activo');
        }
        function cerrarModal() {
            document.getElementById('modal-overlay').classList.remove('activo');
        }
    </script>
</body>
</html>
