<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso - Taximeter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="ticket">
        <div class="screen-tag">ACCESO</div>
        <div class="ticket-head">
            <div class="brand-mark">TX · MADRID</div>
            <h1 class="brand-title">TAXIMETER</h1>
            <div class="brand-sub">IDENTIFICACIÓN</div>
        </div>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="field-row">
                <div class="field-label">USUARIO</div>
                <input type="text" name="username" required>
            </div>
            <div class="field-row">
                <div class="field-label">CONTRASEÑA</div>
                <input type="password" name="password" required>
            </div>
            <div class="actions">
                <button type="submit" class="fire" style="grid-column: 1 / -1;">ENTRAR</button>
            </div>
        </form>
    </div>
</body>
</html>
