<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historial - Taximeter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="ticket">
        <div class="screen-tag">REGISTRO</div>
        <div class="ticket-head">
            <div class="brand-mark">TX · MADRID</div>
            <h1 class="brand-title">HISTORIAL</h1>
            <div class="brand-sub">VIAJES REGISTRADOS</div>
        </div>

        {% if viajes %}
            <div class="hist-head">
                <span>FECHA</span>
                <span>DURACIÓN</span>
                <span>IMPORTE</span>
            </div>
            {% for viaje in viajes %}
                <div class="hist-row">
                    <span class="date">{{ viaje[0] }}</span>
                    <span class="dur">{{ viaje[1] }}s</span>
                    <span class="price">€{{ "%.2f"|format(viaje[4]) }}</span>
                </div>
            {% endfor %}
        {% else %}
            <div class="empty-state">No hay viajes registrados todavía.</div>
        {% endif %}

        <a href="/" class="back-link">← VOLVER</a>
    </div>
</body>
</html>
